runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 40
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://monosyth.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: monosyth.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: monosyth
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: monosyth.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "143451727719"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:143451727719:web:aaef614751a710cf5e31c2
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-LXCLTKYMTY
    availability:
      - BUILD
      - RUNTIME
  - variable: AMBIENT_API_KEY
    secret: AMBIENT_API_KEY
    availability:
      - RUNTIME
  - variable: AMBIENT_APPLICATION_KEY
    secret: AMBIENT_APPLICATION_KEY
    availability:
      - RUNTIME
  - variable: WEATHER_LIMIT
    value: "48"
    availability:
      - RUNTIME
